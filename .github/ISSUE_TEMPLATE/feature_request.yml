name: Feature request
description: Suggest a focused improvement.
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should CoolBoard do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Any simpler or safer approach?
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or mockups
      description: Add cropped screenshots or rough UI references if useful.
