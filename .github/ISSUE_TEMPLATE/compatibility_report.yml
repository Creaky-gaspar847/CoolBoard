name: Compatibility report
description: Report sensor and fan behavior for a specific Apple Silicon Mac.
title: "Compatibility: "
labels: ["compatibility"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing CoolBoard. Please crop screenshots to the CoolBoard window only.
  - type: input
    id: mac-model
    attributes:
      label: Mac model
      description: Example: MacBookPro20,2, Mac14,6, MacBook Air M3.
      placeholder: "MacBookPro20,2"
    validations:
      required: true
  - type: input
    id: chip
    attributes:
      label: Chip
      placeholder: "M2 Pro"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "15.5"
    validations:
      required: true
  - type: dropdown
    id: fans
    attributes:
      label: Detected fans
      options:
        - "0"
        - "1"
        - "2"
        - "More than 2"
    validations:
      required: true
  - type: dropdown
    id: manual-control
    attributes:
      label: Manual fan control
      options:
        - "Works"
        - "Monitoring only"
        - "Fails with helper error"
        - "Fails with SMC error"
        - "Not tested"
    validations:
      required: true
  - type: textarea
    id: sensors
    attributes:
      label: Sensors shown
      description: List the main CPU/GPU/AirPort/Power/Battery readings that appear.
      placeholder: "CPU TCDX, CPU TCHP, GPU TSG1, Battery Pack..."
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: Attach a screenshot of the CoolBoard window only.
      placeholder: "Drag a cropped screenshot here."
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Any errors, missing sensors, RPM behavior, or install details.
